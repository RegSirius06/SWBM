{% extends "base_generic.html" %}

{% block hero %}
<h1 class="display-4 fw-bold mb-3">Изменение транзакции</h1>
{% endblock %}

{% block content %}
<form method="post" class="needs-validation" novalidate>
    {% csrf_token %}

    <table>
        {{ form }}
    </table>


    <div class="d-flex flex-wrap gap-2 mt-4">
        <button type="submit" name="update" class="btn btn-primary" value="1">
            <i class="bi bi-pencil-square me-1"></i>Обновить
        </button>

        <button type="submit" name="delete" class="btn btn-danger" value="1">
            <i class="bi bi-trash me-1"></i>Удалить
        </button>

        {% if counted %}
            <button type="submit" name="edit" class="btn btn-outline-warning" value="1">
                <i class="bi bi-x-circle me-1"></i>Отменить
            </button>
        {% else %}
            <button type="submit" name="edit" class="btn btn-outline-success" value="1">
                <i class="bi bi-check-circle me-1"></i>Посчитать
            </button>
        {% endif %}
    </div>
</form>
{% endblock %}
